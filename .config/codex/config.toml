# Model
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"

# Security & Sandbox
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# Behavior
# `personality` here selects the value; `[features].personality = true` enables the system. Both required.
personality = "friendly"
file_opener = "none"
web_search = "cached"
project_root_markers = [".git", ".codex-root"]
project_doc_fallback_filenames = ["CLAUDE.md"]
# Disable Co-authored-by trailer. Default is "Codex <noreply@openai.com>"; matches CLAUDE.md ## Drafting Prose "no AI attribution".
commit_attribution = ""

[sandbox_workspace_write]
network_access = false
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

# Features
[features]
fast_mode = false
personality = true
prevent_idle_sleep = true

# UI
[tui]
show_tooltips = true
notifications = true
notification_method = "auto"
animations = true
theme = "catppuccin-macchiato"
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
]
terminal_title = ["spinner", "thread", "project", "app-name"]

# Data & Telemetry
[history]
persistence = "save-all"
max_bytes = 104857600  # 100 MiB cap

[analytics]
enabled = false

[feedback]
enabled = false

# Integrations
[plugins."caveman@caveman-repo"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[plugins."atlassian-rovo@openai-curated"]
enabled = true

[plugins."datadog@openai-curated"]
enabled = true

[plugins."posthog@openai-curated"]
enabled = true

[plugins."context7@context7-marketplace"]
enabled = true

[marketplaces.caveman-repo]
source_type = "git"
source = "https://github.com/JuliusBrussee/caveman.git"

[marketplaces.context7-marketplace]
source_type = "git"
source = "https://github.com/upstash/context7.git"
