# Model
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"

# Security & Sandbox
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# Behavior
# `personality` here selects the value; `[features].personality = true` enables the system. Both required.
personality = "friendly"
file_opener = "vscode"
web_search = "cached"
project_root_markers = [".git", ".codex-root"]
project_doc_fallback_filenames = ["CLAUDE.md"]
commit_attribution = ""

[sandbox_workspace_write]
network_access = false
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

# Features
[features]
fast_mode = false
personality = true
prevent_idle_sleep = true

# UI
[tui]
show_tooltips = true
notifications = true
notification_method = "auto"
animations = true
theme = "catppuccin-macchiato"
status_line = [
    "model-with-reasoning",
    "current-dir",
    "git-branch",
    "context-remaining",
    "five-hour-limit",
    "weekly-limit",
]
terminal_title = ["spinner", "thread", "project", "app-name"]

# Data & Telemetry
[history]
persistence = "save-all"
max_bytes = 104857600    # 100 MiB cap

[analytics]
enabled = false

[feedback]
enabled = false

# Profiles
[profiles.quick]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "medium"

[profiles.research]
web_search = "live"

# Integrations
[mcp_servers.atlassian]
url = "https://mcp.atlassian.com/v1/mcp"

[mcp_servers.datadog]
url = "https://mcp.datadoghq.com/api/unstable/mcp-server/mcp"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.posthog]
url = "https://mcp.posthog.com/mcp"

[plugins."caveman@caveman-repo"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[marketplaces.caveman-repo]
source_type = "git"
source = "https://github.com/JuliusBrussee/caveman.git"
