# Defaults
editor = "codium --reuse-window --wait --"
# dir_editor omits --reuse-window (would clobber focused workspace) and --wait (spf would block for the entire VSCodium workspace session, not just a tab edit). Matches lazygit upstream `openDirInEditor` pattern.
dir_editor = "codium --"
auto_check_update = false
cd_on_quit = false
file_size_use_si = false
default_open_file_preview = true
show_image_preview = true
show_panel_footer_info = true
ignore_missing_fields = true

# Sort & display
default_sort_type = 0
sort_order_reversed = false
case_sensitive_sort = false
file_panel_extra_columns = 0

# Styling
theme = "catppuccin-macchiato"
code_previewer = "bat"
nerdfont = true
show_select_icons = true
enable_file_preview_border = true

# Plugins
metadata = true
enable_md5_checksum = true
zoxide_support = true
