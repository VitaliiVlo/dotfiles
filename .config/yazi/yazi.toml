[mgr]
show_hidden = true
show_symlink = true
sort_by = "alphabetical"
sort_reverse = false
sort_dir_first = true
sort_sensitive = false
linemode = "none"
scrolloff = 3

[preview]
wrap = "no"
tab_size = 4

[opener]
# Single edit opener branches in shell on file-vs-dir, matching lazygit upstream `vscode` preset:
# file → `codium --reuse-window -- %s1` (tab attach to focused window)
# dir  → `codium -- %s1`               (bare; smart-attach or new workspace, never clobbers)
# orphan = true detaches codium via setsid + null stdio so it survives yazi exit.
# No `[open] prepend_rules` needed: yazi's default folder rule routes `*/` to the `edit` opener; the shell branch handles dir vs file inside `run`.
edit = [
  { run = 'if [ -d %s1 ]; then codium -- %s1; else codium --reuse-window -- %s1; fi', desc = "VSCodium", for = "unix", orphan = true },
]
