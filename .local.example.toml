# Local overrides — copy to `.local/source.toml` and fill in real values.
# `.local/` is gitignored; tracked configs hold neutral placeholders.
# Re-run `make local-overrides` (or `make setup`) after editing this file.

[git]
email = "your.email@example.com"
name = "your-username"

[go]
# Module path glob matching your private modules. Uncomment and replace with your value.
# Empty/unset skips the override entirely (leaves .zprofile GOPRIVATE as shipped).
# private = "github.com/your-org/*"

# Marketplace tables (Claude + Codex share the same fields):
#   source = "github" | "git"
#   repo   = "<org/repo>"        (when source = "github")
#   url    = "<git url>"         (when source = "git")
#   auto_update = true | false   (default true; Claude only, Codex ignores it)
# Each [<tool>.marketplaces.<key>] is rendered into that tool's native config.
# Plugins are "<plugin-name>@<marketplace-key>"; the marketplace must be declared above
# or that tool's built-in (Claude: claude-plugins-official, Codex: openai-curated).

# Claude: marketplaces -> extraKnownMarketplaces, plugins -> enabledPlugins[...] = true
# [claude.marketplaces.example-team]
# source = "github"
# repo = "your-org/your-claude-marketplace"
# auto_update = true

[claude]
plugins = [
  # "coding-standards@example-team",
  # "devops@example-team",
]

# Codex: marketplaces -> [marketplaces.<key>] (source_type = "git"), plugins -> [plugins."<id>"] enabled = true.
# Do not declare the openai-curated marketplace (CLI built-in). Override only adds; it
# never disables a marketplace/plugin already tracked in .config/codex/config.toml.
# [codex.marketplaces.example-team]
# source = "github"
# repo = "your-org/your-codex-marketplace"

[codex]
plugins = [
  # "coding-standards@example-team",
]

[aliases]
# Per-machine shell aliases rendered into .zshrc between the local-overrides marker block.
# Key = alias name, value = command run at use time (single-quoted verbatim, so $(...) expands when invoked).
# prod-ctx = "kubectl config use-context your-prod-context"
# aws-creds = "eval \"$(aws configure export-credentials --profile your-aws-profile --format env)\""
